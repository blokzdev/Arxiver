# Use Robolectric's NATIVE SQLite (real SQLite) instead of the LEGACY Java shadow. The legacy shadow's
# per-thread connection-pointer bookkeeping races Room 2.7's InvalidationTracker refresh coroutine when it
# fires after db.close(), throwing "Illegal connection pointer" and flaking the suite
# (UncaughtExceptionsBeforeTest). NATIVE mode has no shadow connection pointers, so the race can't manifest.
# See memory robolectric-room-sync-executors.
sqliteMode=NATIVE
