name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build signed APK & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Decode signing keystore
        # Required repo secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD.
        # Generate: keytool -genkey -v -keystore arxiver.jks -keyalg RSA -keysize 2048 -validity 10000 -alias arxiver
        # Then:     base64 -w0 arxiver.jks → KEYSTORE_BASE64
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/arxiver.jks

      - name: Build release APK
        env:
          ARXIVER_KEYSTORE_FILE: ${{ runner.temp }}/arxiver.jks
          ARXIVER_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ARXIVER_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ARXIVER_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Rename artifact
        run: cp app/build/outputs/apk/release/app-release.apk arxiver-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: arxiver-${{ github.ref_name }}.apk
          generate_release_notes: true
